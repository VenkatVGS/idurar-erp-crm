replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

istio:
  enabled: true
  virtualService:
    hosts:
    - "idurar.example.com"
    gateways:
    - idurar-gateway

ingress:
  enabled: false

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  REACT_APP_API_URL: "http://backend:5000"

cloudwatch:
  enabled: true
  logGroup: "/idurar-app/frontend"
  region: ap-south-1
